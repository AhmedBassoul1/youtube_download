<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </div>
            <h1>YouTube Downloader</h1>
            <p class="subtitle">Paste a link, pick your format, and grab it.</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput"  placeholder="Paste YouTube link here...">
        </div>

        <div class="toggle-group">
            <label class="toggle-switch">
                <input type="checkbox" id="audioOnly">
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label">
                    <span class="toggle-title">Audio only (MP3)</span>
                    <span class="toggle-sub">Strip the video, keep the sound</span>
                </span>
            </label>
        </div>

        <div id="qualityContainer" class="quality-group">
            <label class="quality-heading">Quality</label>
            <div class="radio-grid">
                <label class="radio-card">
                    <input type="radio" name="quality" value="4k">
                    <span class="radio-content">
                        <span class="radio-title">4K</span>
                        <span class="radio-sub">Ultra HD</span>
                    </span>
                </label>
                <label class="radio-card">
                    <input type="radio" name="quality" value="1080p" checked>
                    <span class="radio-content">
                        <span class="radio-title">1080p</span>
                        <span class="radio-sub">Full HD</span>
                    </span>
                </label>
                <label class="radio-card">
                    <input type="radio" name="quality" value="720p">
                    <span class="radio-content">
                        <span class="radio-title">720p</span>
                        <span class="radio-sub">HD</span>
                    </span>
                </label>
                <label class="radio-card">
                    <input type="radio" name="quality" value="480p">
                    <span class="radio-content">
                        <span class="radio-title">480p</span>
                        <span class="radio-sub">SD</span>
                    </span>
                </label>
                <label class="radio-card radio-card-wide">
                    <input type="radio" name="quality" value="low">
                    <span class="radio-content">
                        <span class="radio-title">Low</span>
                        <span class="radio-sub">Data Saver</span>
                    </span>
                </label>
            </div>
            <select id="qualitySelect" class="hidden-select" aria-hidden="true" tabindex="-1">
                <option value="4k">4K</option>
                <option value="1080p" selected>1080p (HD)</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
                <option value="low">Low (Data Saver)</option>
            </select>
        </div>

        <button onclick="startDownload()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>Download</span>
        </button>

        <div id="status"></div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
